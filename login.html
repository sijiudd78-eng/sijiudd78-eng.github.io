<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopzene · Office Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

    /* YOUR PHOTO BACKGROUND - NO BLUR */
    .bg-image {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2;
      background-image: url('images/hero-min.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Dark overlay for readability */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.7) 0%, rgba(30, 41, 59, 0.6) 100%);
      z-index: -1;
    }

    .container {
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 1.5rem;
    }

    /* Glass Card */
    .auth-card {
      width: 100%; max-width: 420px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.5rem; padding: 2rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      color: white;
      animation: floatIn 0.8s ease;
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .brand { text-align: center; margin-bottom: 1.5rem; }
    .brand h1 {
      font-size: 2.2rem; font-weight: 800;
      background: linear-gradient(135deg, #fff, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand span { font-size: 0.8rem; opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; }

    .toggle-tabs { display: flex; background: rgba(0, 0, 0, 0.3); border-radius: 50px; padding: 0.3rem; margin-bottom: 1.5rem; }
    .toggle-tab { flex: 1; text-align: center; padding: 0.7rem; font-weight: 600; border-radius: 40px; cursor: pointer; transition: all 0.3s; color: rgba(255,255,255,0.7); }
    .toggle-tab.active { background: white; color: #1e293b; }

    .form.hidden { display: none; }
    .form { display: flex; flex-direction: column; gap: 1rem; }

    .input-group {
      display: flex; align-items: center; background: rgba(255, 255, 255, 0.1);
      border-radius: 35px; padding: 0.1rem 1rem; border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.3s;
    }
    .input-group:focus-within { background: rgba(255, 255, 255, 0.18); border-color: #60a5fa; }
    .input-group i { width: 1.8rem; color: rgba(255,255,255,0.7); }
    .input-group input { width: 100%; background: transparent; border: none; padding: 0.9rem 0.5rem; color: white; outline: none; font-size: 1rem; }
    .input-group input::placeholder { color: rgba(255,255,255,0.5); }

    .row-flex { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; margin: 0.3rem 0; }
    .checkbox-label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: rgba(255,255,255,0.8); }
    .checkbox-label input { accent-color: #60a5fa; }
    .forgot-link { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.8rem; }
    .forgot-link:hover { text-decoration: underline; }

    .btn-primary {
      background: white; border: none;
      padding: 0.9rem; border-radius: 35px; font-weight: 700; font-size: 1rem;
      color: #1e293b; cursor: pointer; transition: all 0.3s; margin-top: 0.5rem;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

    .divider { display: flex; align-items: center; gap: 1rem; color: rgba(255,255,255,0.5); font-size: 0.8rem; margin: 1rem 0; }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.2); }

    .social-login { display: flex; justify-content: center; gap: 0.8rem; }
    .social-icon {
      display: flex; align-items: center; justify-content: center; width: 45px; height: 45px;
      border-radius: 50%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
      color: white; font-size: 1.2rem; transition: all 0.3s;
    }
    .social-icon:hover { background: rgba(255,255,255,0.25); transform: translateY(-3px); }

    .live-ticker { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; display: flex; align-items: center; gap: 0.5rem; color: rgba(255,255,255,0.8); }
    .ticker-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .ticker-wrap { overflow: hidden; width: 100%; }
    .ticker-text { display: inline-block; animation: tickerMove 15s linear infinite; white-space: nowrap; }
    @keyframes tickerMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .terms-text { font-size: 0.7rem; text-align: center; opacity: 0.6; margin-top: 1rem; }
    .terms-text a { color: rgba(255,255,255,0.8); }

    .error-msg { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 0.7rem; border-radius: 10px; font-size: 0.85rem; display: none; text-align: center; }
    .success-msg { background: rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.3); color: #86efac; padding: 0.7rem; border-radius: 10px; font-size: 0.85rem; display: none; text-align: center; }
  </style>
</head>
<body>
  <!-- YOUR PHOTO - CRISP NO BLUR -->
  <div class="bg-image"></div>
  <div class="overlay"></div>

  <div class="container">
    <div class="auth-card">
      <div class="brand">
        <h1>shopzene</h1>
        <span>complete orders · earn daily</span>
      </div>

      <div class="toggle-tabs">
        <div class="toggle-tab active" id="loginTab">Log in</div>
        <div class="toggle-tab" id="signupTab">Sign up</div>
      </div>

      <div class="forms-container">
        <div class="form" id="loginForm">
          <div class="error-msg" id="loginError"></div>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Email address" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="Password" required>
          </div>
          <div class="row-flex">
            <label class="checkbox-label"><input type="checkbox" checked> <span>Remember me</span></label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <button class="btn-primary" onclick="handleLogin()">Log in to dashboard</button>
        </div>

        <div class="form hidden" id="signupForm">
          <div class="error-msg" id="signupError"></div>
          <div class="success-msg" id="signupSuccess"></div>
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="signupName" placeholder="Full name" required>
          </div>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="signupEmail" placeholder="Email address" required>
          </div>
          <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="tel" id="signupPhone" placeholder="Phone number" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupPassword" placeholder="Password" required>
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupConfirm" placeholder="Confirm password" required>
          </div>
          <button class="btn-primary" onclick="handleSignup()">Create free account</button>
        </div>
      </div>



      <div class="live-ticker">
        <span class="ticker-dot"></span>
        <div class="ticker-wrap">
          <span class="ticker-text">⚡ Alex completed 5 orders · Maria earned $120 · James upgraded to VIP 2 · Sarah +$89 · Chris reached daily goal ·</span>
        </div>
      </div>

      <div class="terms-text">By joining you agree to Shopzene's <a href="#">Terms</a></div>
    </div>
  </div>

  <script>
    // Simple Public Access - No Master Key Needed
    const JSON_BIN_ID = '69bdb87ac3097a1dd54421b8';
    const JSON_BIN_URL = `https://api.jsonbin.io/v3/b/${JSON_BIN_ID}/latest`;
    
    async function getSharedData() {
      try {
        const response = await fetch(JSON_BIN_URL);
        const data = await response.json();
        return data.record || { users: [], deposits: [], withdrawals: [], earnings: [] };
      } catch (error) {
        console.log('JSON Bin error, using localStorage:', error);
        // Fallback to localStorage
        return {
          users: JSON.parse(localStorage.getItem('site_users') || '[]'),
          deposits: JSON.parse(localStorage.getItem('shopezene_deposits') || '[]'),
          withdrawals: JSON.parse(localStorage.getItem('shopezene_withdrawals') || '[]'),
          earnings: JSON.parse(localStorage.getItem('shopezene_earnings') || '[]')
        };
      }
    }
    
    async function saveSharedData(data) {
      try {
        // For now, just use localStorage
        localStorage.setItem('site_users', JSON.stringify(data.users));
        localStorage.setItem('shopezene_deposits', JSON.stringify(data.deposits));
        localStorage.setItem('shopezene_withdrawals', JSON.stringify(data.withdrawals));
        localStorage.setItem('shopezene_earnings', JSON.stringify(data.earnings));
        console.log('Data saved to localStorage (JSON Bin write would need Master Key)');
      } catch (error) {
        console.log('Save error:', error);
      }
    }

    // Commented out auto-redirect to allow manual access to login page
    // if (localStorage.getItem('userLoggedIn') === 'true') {
    //   window.location.href = 'index.html';
    // }

    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    function setActiveTab(tab) {
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('signupError').style.display = 'none';
      document.getElementById('signupSuccess').style.display = 'none';
      if (tab === 'login') {
        loginTab.classList.add('active'); signupTab.classList.remove('active');
        loginForm.classList.remove('hidden'); signupForm.classList.add('hidden');
      } else {
        signupTab.classList.add('active'); loginTab.classList.remove('active');
        signupForm.classList.remove('hidden'); loginForm.classList.add('hidden');
      }
    }

    loginTab.addEventListener('click', () => setActiveTab('login'));
    signupTab.addEventListener('click', () => setActiveTab('signup'));

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorDiv = document.getElementById('loginError');

      if (!email || !password) { errorDiv.textContent = 'Please fill in all fields'; errorDiv.style.display = 'block'; return; }

      const sharedData = await getSharedData();
      const user = sharedData.users.find(u => u.email === email && u.password === password);

      if (user) {
        localStorage.setItem('currentUser', JSON.stringify(user));
        localStorage.setItem('userLoggedIn', 'true');
        
        // Initialize user data if not exists
        if (!localStorage.getItem('shopezene_balance')) localStorage.setItem('shopezene_balance', user.balance || '0');
        if (!localStorage.getItem('shopezene_deposits')) localStorage.setItem('shopezene_deposits', '[]');
        if (!localStorage.getItem('shopezene_withdrawals')) localStorage.setItem('shopezene_withdrawals', '[]');
        if (!localStorage.getItem('shopezene_earnings')) localStorage.setItem('shopezene_earnings', '[]');
        
        // Check if admin
        if (user.email === 'admin@test.com' || user.isAdmin) {
          window.location.href = 'admin-new.html';
        } else {
          window.location.href = 'index.html';
        }
      } else { errorDiv.textContent = 'Invalid email or password'; errorDiv.style.display = 'block'; }
    }

    async function handleSignup() {
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const phone = document.getElementById('signupPhone').value;
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const errorDiv = document.getElementById('signupError');
      const successDiv = document.getElementById('signupSuccess');

      if (!name || !email || !phone || !password || !confirm) { errorDiv.textContent = 'Please fill in all fields'; errorDiv.style.display = 'block'; return; }
      if (password !== confirm) { errorDiv.textContent = 'Passwords do not match'; errorDiv.style.display = 'block'; return; }
      if (password.length < 6) { errorDiv.textContent = 'Password must be at least 6 characters'; errorDiv.style.display = 'block'; return; }

      // Get current data and add new user
      const sharedData = await getSharedData();
      if (sharedData.users.find(u => u.email === email)) { errorDiv.textContent = 'Account already exists'; errorDiv.style.display = 'block'; return; }

      const nameParts = name.trim().split(' ');
      const newUser = { id: Date.now(), firstName: nameParts[0], lastName: nameParts.slice(1).join(' ') || '', fullName: name, email, phone, password, balance: '0.00', deposit: '0.00', withdraw: '0.00', earnings: '0.00', vipLevel: 'Starter', createdAt: new Date().toISOString() };
      
      // Add user to existing data
      sharedData.users.push(newUser);
      
      // Save all data back
      await saveSharedData(sharedData);

      errorDiv.style.display = 'none';
      successDiv.textContent = 'Account created! Please log in.';
      successDiv.style.display = 'block';
      setTimeout(() => setActiveTab('login'), 2000);
    }

    document.getElementById('loginPassword').addEventListener('keypress', function(e) { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('signupConfirm').addEventListener('keypress', function(e) { if (e.key === 'Enter') handleSignup(); });
  </script>
</body>
</html>
